<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כניסה למערכת - Calcala-News</title>

    <!-- Tailwind CSS -->
    

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&family=Rubik:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Admin Styles -->
    <link rel="stylesheet" href="css/admin-styles.css">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="../css/tailwind-build.css" />
</head>

<body class="bg-gray-50">
    <div class="min-h-screen flex items-center justify-center px-4 py-12">
        <div class="max-w-md w-full">
            <!-- Logo/Title -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-900 mb-2">Calcala-News</h1>
                <p class="text-gray-600">לוח בקרה למנהלי תוכן</p>
            </div>

            <!-- Login Card -->
            <div class="bg-white rounded-xl shadow-lg p-8">
                <h2 class="text-2xl font-semibold text-gray-900 mb-6 text-center">כניסה למערכת</h2>

                <!-- Login Form -->
                <form id="loginForm" class="space-y-5">
                    <!-- Email Field -->
                    <div class="form-group">
                        <label for="email" class="form-label">דוא״ל</label>
                        <input type="email" id="email" name="email" class="form-input"
                            placeholder="example@calcala-news.co.il" required autocomplete="email">
                    </div>

                    <!-- Password Field -->
                    <div class="form-group">
                        <label for="password" class="form-label">סיסמה</label>
                        <input type="password" id="password" name="password" class="form-input" placeholder="••••••••"
                            required autocomplete="current-password">
                    </div>

                    <!-- Error Message -->
                    <div id="errorMessage" class="hidden">
                        <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm">
                            <span id="errorText"></span>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" id="loginButton" class="w-full btn btn-primary justify-center">
                        <span id="loginButtonText">כניסה למערכת</span>
                        <div id="loginSpinner" class="hidden">
                            <div class="spinner" style="width: 20px; height: 20px; border-width: 2px;"></div>
                        </div>
                    </button>
                </form>

                <!-- Additional Links -->
                <div class="mt-6 text-center">
                    <a href="#" class="text-sm text-blue-600 hover:text-blue-700">שכחתי סיסמה</a>
                </div>
            </div>

            <!-- Footer -->
            <div class="mt-8 text-center text-sm text-gray-500">
                <p>© 2026 Calcala-News. כל הזכויות שמורות.</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script defer src="js/supabase-client.js"></script>
    <script>
        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const loginButton = document.getElementById('loginButton');
            const loginButtonText = document.getElementById('loginButtonText');
            const loginSpinner = document.getElementById('loginSpinner');

            // Hide previous errors
            errorMessage.classList.add('hidden');

            // Show loading state
            loginButton.disabled = true;
            loginButtonText.classList.add('hidden');
            loginSpinner.classList.remove('hidden');

            try {
                // Sign in with Supabase
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    throw error;
                }

                // Success - redirect to dashboard
                window.location.href = '/admin/dashboard.html';

            } catch (error) {
                console.error('Login error:', error);

                // Show error message
                let errorMsg = 'שגיאה בהתחברות. אנא נסה שוב.';

                if (error.message.includes('Invalid login credentials')) {
                    errorMsg = 'דוא״ל או סיסמה שגויים';
                } else if (error.message.includes('Email not confirmed')) {
                    errorMsg = 'יש לאמת את כתובת הדוא״ל';
                } else if (error.message.includes('network')) {
                    errorMsg = 'אין חיבור לשרת - נסה שוב';
                }

                errorText.textContent = errorMsg;
                errorMessage.classList.remove('hidden');

                // Reset button state
                loginButton.disabled = false;
                loginButtonText.classList.remove('hidden');
                loginSpinner.classList.add('hidden');
            }
        });

        // Check if already logged in
        (async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                window.location.href = '/admin/dashboard.html';
            }
        })();
    </script>
</body>

</html>
