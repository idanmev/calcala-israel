<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>ניהול לידים - Calcala-News</title>
    
    <link rel="stylesheet" href="/admin/css/admin-styles.css">
    <link rel="stylesheet" href="../css/tailwind-build.css" />
</head>

<body class="bg-gray-100">

    <!-- Top bar (same as dashboard) -->
    <div id="admin-topbar"></div>

    <div class="flex">
        <!-- Sidebar -->
        <div id="admin-sidebar">
            <aside class="fixed right-0 top-16 bottom-0 w-64 bg-white border-l border-gray-200 overflow-y-auto">
                <nav class="p-4 space-y-1">
                    <a href="/admin/dashboard"
                        class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-700 hover:bg-gray-100 text-sm transition-colors">
                        <span class="text-lg">📰</span>
                        מאמרים
                    </a>
                    <a href="/admin/categories"
                        class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-700 hover:bg-gray-100 text-sm transition-colors">
                        <span class="text-lg">🏷️</span>
                        קטגוריות
                    </a>
                    <a href="/admin/leads"
                        class="flex items-center gap-3 px-3 py-2 rounded-lg bg-blue-50 text-blue-700 font-bold text-sm transition-colors">
                        <span class="text-lg">🎯</span>
                        לידים
                    </a>
                    <a href="/admin/quiz-config"
                        class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-700 hover:bg-gray-100 text-sm transition-colors">
                        <span class="text-lg">❓</span>
                        חידוני זכאות
                    </a>
                </nav>
            </aside>
        </div>

        <!-- Main content -->
        <main class="flex-1 p-8 mr-64 mt-16">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold text-gray-900">ניהול לידים</h1>
                <div class="flex gap-3">
                    <select id="vertical-filter" onchange="filterLeads()"
                        class="border border-gray-300 rounded-lg px-3 py-2 text-sm">
                        <option value="">כל הוורטיקלים</option>
                        <option value="מיסוי">מיסוי</option>
                        <option value="ביטוח בריאות">ביטוח בריאות</option>
                        <option value="פנסיה">פנסיה</option>
                        <option value="נדל&quot;ן">נדל"ן</option>
                    </select>
                    <select id="status-filter" onchange="filterLeads()"
                        class="border border-gray-300 rounded-lg px-3 py-2 text-sm">
                        <option value="">כל הסטטוסים</option>
                        <option value="new">חדש</option>
                        <option value="contacted">יצרנו קשר</option>
                        <option value="qualified">מוסמך</option>
                        <option value="rejected">נדחה</option>
                    </select>
                    <button onclick="exportLeads()"
                        class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-bold">
                        📥 ייצוא CSV
                    </button>
                </div>
            </div>

            <!-- Stats row -->
            <div class="grid grid-cols-4 gap-4 mb-8">
                <div class="bg-white rounded-xl p-4 shadow-sm text-center">
                    <p class="text-3xl font-bold text-gray-900" id="stat-total">—</p>
                    <p class="text-sm text-gray-500 mt-1">סה"כ לידים</p>
                </div>
                <div class="bg-white rounded-xl p-4 shadow-sm text-center">
                    <p class="text-3xl font-bold text-red-600" id="stat-today">—</p>
                    <p class="text-sm text-gray-500 mt-1">היום</p>
                </div>
                <div class="bg-white rounded-xl p-4 shadow-sm text-center">
                    <p class="text-3xl font-bold text-blue-600" id="stat-week">—</p>
                    <p class="text-sm text-gray-500 mt-1">השבוע</p>
                </div>
                <div class="bg-white rounded-xl p-4 shadow-sm text-center">
                    <p class="text-3xl font-bold text-green-600" id="stat-qualified">—</p>
                    <p class="text-sm text-gray-500 mt-1">מוסמכים</p>
                </div>
            </div>

            <!-- Leads table -->
            <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                <table class="w-full">
                    <thead class="bg-gray-50 border-b border-gray-200">
                        <tr>
                            <th class="text-right px-6 py-4 text-sm font-bold text-gray-700">שם</th>
                            <th class="text-right px-6 py-4 text-sm font-bold text-gray-700">טלפון</th>
                            <th class="text-right px-6 py-4 text-sm font-bold text-gray-700">ורטיקל</th>
                            <th class="text-right px-6 py-4 text-sm font-bold text-gray-700">מקור מאמר</th>
                            <th class="text-right px-6 py-4 text-sm font-bold text-gray-700">תשובות</th>
                            <th class="text-right px-6 py-4 text-sm font-bold text-gray-700">תאריך</th>
                            <th class="text-right px-6 py-4 text-sm font-bold text-gray-700">סטטוס</th>
                            <th class="text-right px-6 py-4 text-sm font-bold text-gray-700">פעולות</th>
                        </tr>
                    </thead>
                    <tbody id="leads-table-body">
                        <tr>
                            <td colspan="7" class="text-center py-12 text-gray-400">טוען לידים...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/admin/js/supabase-client.js"></script>
    <script src="/admin/js/auth.js"></script>
    <script>
        let allLeads = [];

        async function loadLeads() {
            const tbody = document.getElementById('leads-table-body');
            try {
                const { data, error } = await supabaseClient
                    .from('leads')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) {
                    console.error('Leads load error:', error);
                    tbody.innerHTML = '<tr><td colspan="8" class="text-center py-12 text-red-500">' +
                        'שגיאה בטעינת הלידים: ' + error.message +
                        '<br><small class="text-gray-400">ייתכן שחסרה מדיניות RLS לטבלת leads. הרץ את migration 07.</small>' +
                        '</td></tr>';
                    return;
                }
                allLeads = data || [];
                updateStats(allLeads);
                renderLeads(allLeads);
            } catch (err) {
                console.error('Leads load exception:', err);
                tbody.innerHTML = '<tr><td colspan="8" class="text-center py-12 text-red-500">שגיאה לא צפויה: ' + err.message + '</td></tr>';
            }
        }

        function updateStats(leads) {
            const today = new Date().toDateString();
            const weekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
            document.getElementById('stat-total').textContent = leads.length;
            document.getElementById('stat-today').textContent = leads.filter(l => new Date(l.created_at).toDateString() === today).length;
            document.getElementById('stat-week').textContent = leads.filter(l => new Date(l.created_at) > weekAgo).length;
            document.getElementById('stat-qualified').textContent = leads.filter(l => l.status === 'qualified').length;
        }

        function escH(s) {
            return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function renderLeads(leads) {
            const tbody = document.getElementById('leads-table-body');
            if (!leads || leads.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center py-12 text-gray-400">אין לידים עדיין</td></tr>';
                return;
            }

            tbody.innerHTML = leads.map(function(lead) {
                var url = lead.source_url || lead.article_url || lead.conversion_url || '';
                var sourceCell = '<span class="text-gray-400">&mdash;</span>';
                if (url) {
                    try {
                        var path = new URL(url).pathname;
                        var slug = path.split('/').filter(Boolean).pop() || path;
                        sourceCell = '<a href="' + escH(url) + '" target="_blank" class="text-blue-600 hover:underline text-xs break-all" title="' + escH(url) + '">' + escH(slug) + '</a>';
                    } catch(e) {
                        sourceCell = '<span class="text-gray-500 text-xs break-all">' + escH(url) + '</span>';
                    }
                }

                var answers = lead.answers || {};
                var answersHtml = Object.values(answers).map(function(v) {
                    return '<span class="inline-block bg-gray-100 px-2 py-0.5 rounded text-xs m-0.5">' + escH(v) + '</span>';
                }).join('');

                var phoneClean = (lead.phone || '').replace(/^0/, '').replace(/-/g, '');
                var dateStr = lead.created_at ? new Date(lead.created_at).toLocaleDateString('he-IL') : '—';

                var statusOpts = ['new:חדש', 'contacted:יצרנו קשר', 'qualified:מוסמך', 'rejected:נדחה'];
                var selectHtml = statusOpts.map(function(opt) {
                    var parts = opt.split(':');
                    var val = parts[0], label = parts[1];
                    return '<option value="' + val + '"' + (lead.status === val ? ' selected' : '') + '>' + label + '</option>';
                }).join('');

                return '<tr class="border-b border-gray-100 hover:bg-gray-50">' +
                    '<td class="px-6 py-4 font-medium">' + escH(lead.name || '—') + '</td>' +
                    '<td class="px-6 py-4"><a href="tel:' + escH(lead.phone) + '" class="text-blue-600 hover:underline font-mono">' + escH(lead.phone) + '</a></td>' +
                    '<td class="px-6 py-4"><span class="bg-red-100 text-red-700 px-2 py-1 rounded text-sm font-bold">' + escH(lead.vertical || '—') + '</span></td>' +
                    '<td class="px-6 py-4 text-sm max-w-[200px]">' + sourceCell + '</td>' +
                    '<td class="px-6 py-4 text-sm text-gray-500 max-w-xs">' + answersHtml + '</td>' +
                    '<td class="px-6 py-4 text-sm text-gray-500">' + dateStr + '</td>' +
                    '<td class="px-6 py-4"><select onchange="updateLeadStatus(\'' + lead.id + '\', this.value)" class="text-sm border border-gray-200 rounded px-2 py-1">' + selectHtml + '</select></td>' +
                    '<td class="px-6 py-4"><div class="flex gap-2 items-center">' +
                        '<a href="https://wa.me/972' + phoneClean + '" target="_blank" class="bg-green-500 hover:bg-green-600 text-white px-3 py-1 rounded text-sm font-bold">💬 וואטסאפ</a>' +
                        '<button onclick="deleteLead(\'' + lead.id + '\')" class="bg-red-100 hover:bg-red-200 text-red-700 px-3 py-1 rounded text-sm font-bold" title="מחק ליד">🗑️</button>' +
                    '</div></td>' +
                '</tr>';
            }).join('');
        }

        function filterLeads() {
            var vertical = document.getElementById('vertical-filter').value;
            var status = document.getElementById('status-filter').value;
            var filtered = allLeads;
            if (vertical) filtered = filtered.filter(function(l) { return l.vertical === vertical; });
            if (status)   filtered = filtered.filter(function(l) { return l.status === status; });
            renderLeads(filtered);
        }

        async function updateLeadStatus(id, status) {
            await supabaseClient.from('leads').update({ status: status }).eq('id', id);
        }

        async function deleteLead(id) {
            if (!confirm('האם למחוק את הליד הזה? פעולה זו אינה הפיכה.')) return;
            var result = await supabaseClient.from('leads').delete().eq('id', id);
            if (result.error) {
                alert('שגיאה במחיקת הליד: ' + result.error.message);
            } else {
                allLeads = allLeads.filter(function(l) { return l.id !== id; });
                filterLeads();
            }
        }

        function exportLeads() {
            var vertical = document.getElementById('vertical-filter').value;
            var leads = allLeads;
            if (vertical) leads = leads.filter(function(l) { return l.vertical === vertical; });

            var rows = [['שם', 'טלפון', 'דואל', 'ורטיקל', 'תשובות', 'מקור', 'תאריך', 'סטטוס']];
            leads.forEach(function(l) {
                rows.push([
                    l.name || '', l.phone || '', l.email || '',
                    l.vertical || '',
                    JSON.stringify(l.answers || {}),
                    l.source_url || '',
                    l.created_at ? new Date(l.created_at).toLocaleDateString('he-IL') : '',
                    l.status || ''
                ]);
            });
            var csv = rows.map(function(row) { return row.join(','); }).join('\n');
            var blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'leads-' + new Date().toISOString().split('T')[0] + '.csv';
            a.click();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() {
                window.authUtils.checkAuth().then(function(isAuth) { if (isAuth) loadLeads(); });
            });
        } else {
            window.authUtils.checkAuth().then(function(isAuth) { if (isAuth) loadLeads(); });
        }
    </script>
</body>

</html>
